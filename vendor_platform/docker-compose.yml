version: '3.8'

services:
  # ── Vendor Database (separate from enterprise deployments) ─────────────────
  vendor_db:
    image: postgres:15
    container_name: vendor-db
    environment:
      POSTGRES_USER: vendor
      POSTGRES_PASSWORD: vendorpass
      POSTGRES_DB: vendor_db
    ports:
      - "5435:5432"
    volumes:
      - vendor_pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - vendor-net
    restart: unless-stopped

  # ── Vendor License & Monitoring API ───────────────────────────────────────
  vendor_api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: vendor-api
    ports:
      - "8002:8002"
    environment:
      - VENDOR_DATABASE_URL=postgresql://vendor:vendorpass@vendor_db:5432/vendor_db
      - VENDOR_HMAC_SECRET=${VENDOR_HMAC_SECRET:-change-me-in-production}
      - VENDOR_JWT_SECRET=${VENDOR_JWT_SECRET:-change-me-jwt-secret}
    volumes:
      - ./api:/app
    depends_on:
      - vendor_db
    networks:
      - vendor-net
    restart: unless-stopped

  # ── Vendor Control Dashboard (Next.js) ────────────────────────────────────
  vendor_dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile.dev
    container_name: vendor-dashboard
    ports:
      - "4000:4000"
    volumes:
      - ./dashboard:/app
      - vendor_dashboard_modules:/app/node_modules
    environment:
      - NEXT_PUBLIC_VENDOR_API_URL=http://localhost:8002
      - PORT=4000
    depends_on:
      - vendor_api
    networks:
      - vendor-net
    restart: unless-stopped

networks:
  vendor-net:
    name: hybrid-shared-net
    external: true

volumes:
  vendor_pgdata:
  vendor_dashboard_modules:
